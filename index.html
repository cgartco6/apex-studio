<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apex Digital MVP Demo</title>
<style>
/* ====== CSS ====== */
body {
    font-family: Arial, sans-serif;
    margin: 0; padding: 0;
    background: #f0f2f5;
}
header {
    background: #1f2937; color: white;
    padding: 1rem;
    text-align: center;
}
h1 { margin: 0; }
section { padding: 1rem; max-width: 1200px; margin: auto; }
.products, .ads { display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center; }
.card { background: white; border-radius: 10px; padding: 1rem; width: 250px; box-shadow: 0 2px 6px rgba(0,0,0,0.15);}
.card img, .ad-media img, .ad-media video { width: 100%; border-radius: 8px; margin-bottom: 0.5rem; }
button { padding: 0.5rem 1rem; border: none; border-radius: 5px; background: #3b82f6; color: white; cursor: pointer; }
button:hover { background: #2563eb; }
.dashboard { background: white; padding: 1rem; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); margin-top: 1rem; }
.ad-media { margin-bottom: 1rem; }
.audio-container { margin-top: 0.5rem; }
@media(max-width:768px){ .products, .ads{ flex-direction: column; align-items:center;} }
</style>
</head>
<body>

<header>
    <h1>Apex Digital MVP Demo</h1>
</header>

<section>
    <h2>🛒 Demo Products</h2>
    <div class="products" id="products"></div>
</section>

<section>
    <h2>🎨 Simulated AI Ads</h2>
    <div class="ads" id="ads"></div>
</section>

<section>
    <h2>📊 Client Dashboard</h2>
    <div class="dashboard" id="dashboard"></div>
</section>

<script>
// ====== JS ======

// Dummy product data
const products = [
    {id:1,name:"Demo Product 1",price:"R199",img:"https://picsum.photos/200?random=1"},
    {id:2,name:"Demo Product 2",price:"R299",img:"https://picsum.photos/200?random=2"},
    {id:3,name:"Demo Product 3",price:"R399",img:"https://picsum.photos/200?random=3"},
];

// Render products
const productsContainer = document.getElementById("products");
products.forEach(p=>{
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
        <img src="${p.img}" alt="${p.name}">
        <h3>${p.name}</h3>
        <p>Price: ${p.price}</p>
        <button onclick="alert('Added ${p.name} to cart')">Add to Cart</button>
    `;
    productsContainer.appendChild(card);
});

// Dummy AI ads (simulated stock content)
const aiAds = [
    {
        image:"https://picsum.photos/300/150?random=10",
        poster:"https://picsum.photos/300/150?random=11",
        video:"https://sample-videos.com/video123/mp4/240/big_buck_bunny_240p_1mb.mp4",
        reel:"https://sample-videos.com/video123/mp4/240/big_buck_bunny_240p_1mb.mp4",
        short:"https://sample-videos.com/video123/mp4/240/big_buck_bunny_240p_1mb.mp4",
        voice:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
    },
    {
        image:"https://picsum.photos/300/150?random=12",
        poster:"https://picsum.photos/300/150?random=13",
        video:"https://sample-videos.com/video123/mp4/240/big_buck_bunny_240p_1mb.mp4",
        reel:"https://sample-videos.com/video123/mp4/240/big_buck_bunny_240p_1mb.mp4",
        short:"https://sample-videos.com/video123/mp4/240/big_buck_bunny_240p_1mb.mp4",
        voice:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
    }
];

// Render AI ads
const adsContainer = document.getElementById("ads");
aiAds.forEach(ad=>{
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
        <div class="ad-media"><img src="${ad.image}" alt="Ad Image"></div>
        <div class="ad-media"><img src="${ad.poster}" alt="Poster"></div>
        <div class="ad-media"><video src="${ad.video}" autoplay loop muted></video></div>
        <div class="ad-media"><video src="${ad.reel}" autoplay loop muted></video></div>
        <div class="ad-media"><video src="${ad.short}" autoplay loop muted></video></div>
        <div class="audio-container"><audio src="${ad.voice}" controls></audio></div>
    `;
    adsContainer.appendChild(card);
});

// Dummy client dashboard
const dashboardContainer = document.getElementById("dashboard");
dashboardContainer.innerHTML = `
    <p>Welcome, Demo Client!</p>
    <p>Active Campaigns: 2</p>
    <p>Current Revenue: R1,250</p>
    <p>Pending AI-generated Ads: 2</p>
`;
</script>

</body>
</html>
