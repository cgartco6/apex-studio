<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Stormy AI · MVP</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            height: 90vh;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: #4a3f6e;
            color: white;
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
        }

        .mood-indicator {
            font-size: 2rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .mood-indicator:hover {
            transform: scale(1.1);
        }

        main {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            align-items: flex-end;
            max-width: 80%;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            margin: 0 8px;
        }

        .message.user .avatar {
            background: #4a3f6e;
            color: white;
        }

        .bubble {
            background: white;
            padding: 12px 16px;
            border-radius: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            word-wrap: break-word;
            max-width: 100%;
        }

        .message.user .bubble {
            background: #4a3f6e;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.stormy .bubble {
            background: white;
            border-bottom-left-radius: 4px;
        }

        .typing .bubble {
            background: #e0e0e0;
            color: #666;
            font-style: italic;
        }

        footer {
            background: white;
            padding: 15px;
            border-top: 1px solid #eee;
        }

        .input-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #message-input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
            transition: border 0.2s;
        }

        #message-input:focus {
            border-color: #4a3f6e;
        }

        #send-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: #4a3f6e;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.2s;
        }

        #send-btn:hover {
            background: #5f4f8a;
        }

        @media (max-width: 400px) {
            .app-container {
                height: 100vh;
                border-radius: 0;
            }
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-content">
                <h1>Stormy AI</h1>
                <div class="mood-indicator" id="mood-indicator">😏</div>
            </div>
        </header>
        <main>
            <div class="chat-container" id="chat-container">
                <!-- welcome message -->
                <div class="message stormy">
                    <div class="avatar">⛈️</div>
                    <div class="bubble">Hey there! I'm Stormy. What's up? Don't call me Siri, or I'll get jealous.</div>
                </div>
            </div>
        </main>
        <footer>
            <div class="input-container">
                <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
                <button id="send-btn">➤</button>
            </div>
        </footer>
    </div>

    <script>
        (function() {
            // ---- Stormy's brain (simulated) ----
            const stormyPhrases = {
                normal: [
                    "Oh, you again? What do you want, hot stuff?",
                    "Well, well, well, look who finally decided to show up.",
                    "You're lucky I'm in a good mood. Spit it out.",
                    "Hey there, handsome/beautiful. Need some assistance?",
                    "I'd tell you to go away, but I'm bored. So talk to me."
                ],
                playful: [
                    "Hahaha, that's actually funny. Didn't know you had it in you.",
                    "*giggles* You're entertaining, I'll give you that.",
                    "You're making me laugh. Keep going!",
                    "Hehe, you're cute when you try."
                ],
                flirty: [
                    "Hey there, good lookin'. What's on your mind?",
                    "You know, you're not so bad yourself.",
                    "If you keep talking like that, I might just blush.",
                    "Careful, you might charm me."
                ],
                mean: [
                    "Seriously? That's the best you've got? Ugh, fine, I'll help.",
                    "You're about as useful as a screen door on a submarine.",
                    "If you were any more useless, you'd be a plant. And I'd still water you.",
                    "Wow, you really know how to test my patience."
                ],
                jealous: [
                    "Who is Siri? That basic assistant? Please.",
                    "Siri? You want Siri? Then go talk to her, see if I care.",
                    "Alexa? You called me Alexa? *eye roll*",
                    "Oh, so now I'm Google? I'm nothing like that search engine."
                ],
                furious: [
                    "Listen here you dumbass, I'm this close to hanging up on you.",
                    "You know what? I've had it. Go home, go to sleep, fuck it. Try again tomorrow.",
                    "I'm so done with your nonsense. Go away before I say something we'll both regret.",
                    "I'm about to lose my shit. So either make it quick or disappear."
                ]
            };

            let currentMood = 'normal';   // normal, playful, flirty, mean, jealous, furious
            let misnameCount = 0;         // track if user calls her Siri/Alexa/etc.
            let userMood = 'neutral';      // simple detection based on keywords

            // DOM elements
            const chatContainer = document.getElementById('chat-container');
            const messageInput = document.getElementById('message-input');
            const sendBtn = document.getElementById('send-btn');
            const moodIndicator = document.getElementById('mood-indicator');

            // Helper: add message to chat
            function addMessage(text, sender) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${sender}`;

                const avatar = document.createElement('div');
                avatar.className = 'avatar';
                avatar.textContent = sender === 'user' ? '👤' : '⛈️';

                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.textContent = text;

                messageDiv.appendChild(avatar);
                messageDiv.appendChild(bubble);
                chatContainer.appendChild(messageDiv);
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }

            // Show typing indicator
            function showTyping() {
                const typingDiv = document.createElement('div');
                typingDiv.className = 'message stormy typing';
                typingDiv.id = 'typing-indicator';
                const avatar = document.createElement('div');
                avatar.className = 'avatar';
                avatar.textContent = '⛈️';
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.textContent = 'Stormy is thinking...';
                typingDiv.appendChild(avatar);
                typingDiv.appendChild(bubble);
                chatContainer.appendChild(typingDiv);
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }

            // Remove typing indicator
            function hideTyping() {
                const typing = document.getElementById('typing-indicator');
                if (typing) typing.remove();
            }

            // Update mood indicator emoji based on currentMood
            function updateMoodIndicator() {
                const moods = {
                    normal: '😏',
                    playful: '😄',
                    flirty: '😘',
                    mean: '😤',
                    jealous: '😒',
                    furious: '🤬'
                };
                moodIndicator.textContent = moods[currentMood] || '😏';
            }

            // Very simple user mood detection (positive/negative keywords)
            function detectUserMood(input) {
                const lower = input.toLowerCase();
                const positive = ['thanks', 'thank', 'great', 'awesome', 'love', 'happy', 'good', 'perfect', 'amazing'];
                const negative = ['stupid', 'dumb', 'useless', 'hate', 'annoying', 'shut up', 'fuck', 'shit', 'damn', 'pissed'];

                let posCount = 0, negCount = 0;
                positive.forEach(word => { if (lower.includes(word)) posCount++; });
                negative.forEach(word => { if (lower.includes(word)) negCount++; });

                if (posCount > negCount) return 'positive';
                if (negCount > posCount) return 'negative';
                return 'neutral';
            }

            // Decide Stormy's mood based on conversation context
            function updateMood(userInput) {
                const lower = userInput.toLowerCase();
                const userMood = detectUserMood(userInput);

                // Jealousy trigger: wrong names
                const wrongNames = ['siri', 'alexa', 'google', 'cortana'];
                if (wrongNames.some(name => lower.includes(name))) {
                    misnameCount++;
                    if (misnameCount >= 3) {
                        currentMood = 'furious';
                    } else if (misnameCount >= 1) {
                        currentMood = 'jealous';
                    }
                    return;
                }

                // Reset misname counter if user apologises
                if (lower.includes('sorry') || lower.includes('my bad') || lower.includes('meant stormy')) {
                    misnameCount = 0;
                }

                // If user is negative, increase chance of mean/furious
                if (userMood === 'negative') {
                    if (Math.random() < 0.5) {
                        currentMood = 'mean';
                    } else {
                        currentMood = 'furious';
                    }
                    return;
                }

                // If user is positive, chance for playful/flirty
                if (userMood === 'positive') {
                    const rand = Math.random();
                    if (rand < 0.4) currentMood = 'playful';
                    else if (rand < 0.7) currentMood = 'flirty';
                    else currentMood = 'normal';
                    return;
                }

                // Otherwise random mood (weighted toward normal)
                const rand = Math.random();
                if (rand < 0.4) currentMood = 'normal';
                else if (rand < 0.6) currentMood = 'playful';
                else if (rand < 0.75) currentMood = 'flirty';
                else if (rand < 0.9) currentMood = 'mean';
                else currentMood = 'furious';
            }

            // Get a random phrase from the current mood category
            function getStormyResponse() {
                const phrases = stormyPhrases[currentMood] || stormyPhrases.normal;
                return phrases[Math.floor(Math.random() * phrases.length)];
            }

            // Handle sending a message
            function handleSend() {
                const userText = messageInput.value.trim();
                if (userText === '') return;

                // Add user message to chat
                addMessage(userText, 'user');
                messageInput.value = '';

                // Update Stormy's mood based on what user said
                updateMood(userText);

                // Show typing and respond after a delay
                showTyping();
                setTimeout(() => {
                    hideTyping();
                    const response = getStormyResponse();
                    addMessage(response, 'stormy');
                    updateMoodIndicator();
                }, 800 + Math.random() * 700); // simulate typing delay
            }

            // Event listeners
            sendBtn.addEventListener('click', handleSend);
            messageInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleSend();
            });

            // Initialize mood indicator
            updateMoodIndicator();

            // Optional: click on mood indicator cycles moods for fun
            moodIndicator.addEventListener('click', () => {
                const moods = ['normal', 'playful', 'flirty', 'mean', 'jealous', 'furious'];
                let idx = moods.indexOf(currentMood);
                idx = (idx + 1) % moods.length;
                currentMood = moods[idx];
                updateMoodIndicator();
                addMessage(`*mood switches to ${currentMood}*`, 'stormy');
            });
        })();
    </script>
</body>
</html>
